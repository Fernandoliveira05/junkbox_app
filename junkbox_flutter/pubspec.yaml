name: junkbox_flutter
description: Minimal Flutter client for the JunkBox OpenAPI backend.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  cross_file: ^0.3.5+2
  flutter:
    sdk: flutter
  flutter_local_notifications: ^22.0.1
  http: ^1.6.0
  http_parser: ^4.1.2
  path_provider: ^2.1.6
  record: ^6.2.1
  share_plus: ^13.1.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo/Logo.png
